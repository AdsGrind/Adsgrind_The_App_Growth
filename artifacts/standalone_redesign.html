<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Redesign - Partners & Connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Syne:wght@400..800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep-navy: #080d1a;
            --text-lavender: #a5a6f6;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-purple: #7C3AED;
            --whatsapp-green: #25D366;
            --telegram-blue: #0088cc;
            --text-muted: #94A3B8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep-navy);
            color: #ffffff;
            font-family: 'DM Sans', sans-serif;
            padding: 100px 20px;
        }

        h2, h3 {
            font-family: 'Syne', sans-serif;
        }

        .container {
            max-width: 1000px;
            mx-auto;
            margin: 0 auto;
            text-align: center;
        }

        /* Partners Section */
        .partners-section {
            margin-bottom: 120px;
        }

        .partners-title {
            font-size: 14px;
            letter-spacing: 0.2em;
            color: var(--text-lavender);
            margin-bottom: 40px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .partners-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
        }

        .partner-card {
            width: 140px;
            height: 90px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.8s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .partner-card:hover {
            border-color: var(--accent-purple);
            transform: translateY(-8px);
            background: rgba(124, 58, 237, 0.05);
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.2);
        }

        .partner-logo {
            width: 80px;
            height: 80px;
            filter: grayscale(1);
            transition: filter 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .partner-card:hover .partner-logo {
            filter: grayscale(0);
        }

        .partner-logo svg {
            max-width: 45px;
            max-height: 45px;
        }

        /* Connect Section */
        .connect-section {
            padding: 80px 0;
        }

        .section-title {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 40px;
            color: #ffffff;
        }

        .cta-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        .btn-pill {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            border-radius: 9999px;
            font-weight: 700;
            text-decoration: none;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
             font-size: 16px;
        }

        .btn-pill:hover {
            transform: scale(1.05);
        }

        .btn-whatsapp {
            background-color: var(--whatsapp-green);
            color: #000;
        }

        .btn-telegram {
            background-color: var(--telegram-blue);
            color: #ffffff;
        }

        .follow-us {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .follow-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .social-icons {
            display: flex;
            gap: 16px;
        }

        .social-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: var(--text-muted);
            text-decoration: none;
        }

        .social-icon:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-lavender);
            border-color: var(--text-lavender);
            transform: translateY(-4px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .partners-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 16px;
            }
            .partner-card {
                width: 100%;
            }
            .cta-buttons {
                flex-direction: column;
                align-items: center;
            }
            .btn-pill {
                width: 100%;
                max-width: 320px;
                justify-content: center;
            }
            .section-title {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container text-center">
        <!-- Partners Section -->
        <div class="partners-section">
            <p class="partners-title">Trusted by Global Leaders</p>
            <div class="partners-grid">

                        </svg>

                </div>
                <!-- Partner 2: Headspace Arc -->

                        </svg>
                    </div>
                </div>
                <!-- Partner 6: Lightning Bolt -->
                <div class="partner-card" style="animation-delay: 0.6s;">
                    <div class="partner-logo">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M7,2H17L13.5,9H17L10,22V14H7V2Z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Reach Out Section -->
        <div class="connect-section">

            <!-- Follow Us -->

</body>
